<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Academic writing workflow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <style>
      .title { font: 700 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2a44; }
      .box { fill: #ffffff; stroke: #7aa2ff; stroke-width: 2; rx: 12; }
      .step { font: 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2a44; }
      .sub { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4a5b82; }
      .arrow { stroke: #7aa2ff; stroke-width: 2.5; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#7aa2ff"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="260" fill="url(#bg)"/>
  <text x="40" y="42" class="title">Paper Writing Workflow</text>

  <rect class="box" x="40" y="70" width="210" height="140" rx="12"/>
  <text class="step" x="58" y="104">1. New Paper</text>
  <text class="sub" x="58" y="130">/newpaper</text>
  <text class="sub" x="58" y="150">+ paper branch</text>

  <rect class="box" x="280" y="70" width="210" height="140" rx="12"/>
  <text class="step" x="298" y="104">2. Research Context</text>
  <text class="sub" x="298" y="130">Zotero PDFs</text>
  <text class="sub" x="298" y="150">evidence pack</text>

  <rect class="box" x="520" y="70" width="210" height="140" rx="12"/>
  <text class="step" x="538" y="104">3. Outline + Write</text>
  <text class="sub" x="538" y="130">/outline /write</text>
  <text class="sub" x="538" y="150">IMRAD sections</text>

  <rect class="box" x="760" y="70" width="210" height="140" rx="12"/>
  <text class="step" x="778" y="104">4. Review + Compile</text>
  <text class="sub" x="778" y="130">/review /compile</text>
  <text class="sub" x="778" y="150">quality + PDF</text>

  <rect class="box" x="1000" y="70" width="160" height="140" rx="12"/>
  <text class="step" x="1018" y="104">5. Checkpoint</text>
  <text class="sub" x="1018" y="130">/commit</text>
  <text class="sub" x="1018" y="150">progress trace</text>

  <line class="arrow" x1="250" y1="140" x2="278" y2="140"/>
  <line class="arrow" x1="490" y1="140" x2="518" y2="140"/>
  <line class="arrow" x1="730" y1="140" x2="758" y2="140"/>
  <line class="arrow" x1="970" y1="140" x2="998" y2="140"/>
</svg>
